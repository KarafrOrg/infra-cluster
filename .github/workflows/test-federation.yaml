name: Test federation
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1019265211616/locations/global/workloadIdentityPools/github-actions/providers/github-oidc
          service_account: github-actions-infra-cluster@karafra-net.iam.gserviceaccount.com

      - run: gcloud secrets list
